<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Yellow background -->
  <rect width="64" height="64" fill="#fef08a"/>
  
  <!-- Dark rounded square (matching navbar style) -->
  <rect x="4" y="4" width="56" height="56" rx="8" fill="#000000"/>
  
  <!-- ZN text -->
  <text x="32" y="42" font-family="ui-monospace, monospace" font-size="36" font-weight="900" fill="#fef08a" text-anchor="middle" dominant-baseline="middle" letter-spacing="-2">ZN</text>
  
  <!-- Border effect -->
  <rect x="4" y="4" width="56" height="56" rx="8" fill="none" stroke="#000000" stroke-width="2"/>
</svg>
